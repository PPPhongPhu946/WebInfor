<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="utf-8">
		<title>In bảng cửu chương</title>
		<link rel="stylesheet" href="../css/style5.css">
	</head>
	<body>
		<div class="container">
			<h2>In bảng cửu chương</h2>
			<label for="so">Nhập số từ 2 đến 9:</label>
			<input type="number" id="so" min="2" max="9">
			<button type="button" id="btnIn">In</button>
			<p id="thongBao"></p>
			<table>
				<thead>
					<tr>
						<th>Phép tính</th>
						<th>Kết quả</th>
					</tr>
				</thead>
				<tbody id="ketQua"></tbody>
			</table>
		</div>
		<script>
			const btnIn = document.getElementById("btnIn");
			const inputSo = document.getElementById("so");
			const ketQua = document.getElementById("ketQua");
			const thongBao = document.getElementById("thongBao");

			btnIn.addEventListener("click", function () {
				const n = Number(inputSo.value);

				if (!Number.isInteger(n) || n < 2 || n > 9) {
					thongBao.textContent = "Vui long nhap so nguyen tu 2 den 9.";
					ketQua.innerHTML = "";
					return;
				}

				thongBao.textContent = "";
				ketQua.innerHTML = "";

				for (let i = 1; i <= 10; i++) {
					const row = document.createElement("tr");
					const phepTinh = document.createElement("td");
					const giaTri = document.createElement("td");

					phepTinh.textContent = n + " x " + i;
					giaTri.textContent = n * i;

					row.appendChild(phepTinh);
					row.appendChild(giaTri);
					ketQua.appendChild(row);
				}
			});
		</script>
	</body>
</html>
