<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="utf-8">
		<title>In bảng cửu chương</title>
		<link rel="stylesheet" href="../css/style5.css">
	</head>
	<body>
		<div class="container">
			<form id="frmInBCC">
				<h2>In bảng cửu chương</h2>
				<label for="myNumber">Nhập số từ 2 - 9:</label>
				<input type="number" id="myNumber" name="number" min="2" max="9" value="5">
				<button type="button" onclick="inBCC()">In</button>
				<div id="kq"></div>
			</form>
		</div>
		<script>
			function inBCC() {
				const myForm = document.forms["frmInBCC"];
				const myNumber = myForm.elements["number"];
				const num = Math.min(9, Math.max(2, Number(myNumber.value) || 2));
				let kq = "";

				myNumber.value = num;

				for (let i = 1; i <= 10; i++) {
					kq += num + " x " + i + " = " + (num * i) + "<br>";
				}

				document.getElementById("kq").innerHTML = kq;
			}
		</script>
	</body>
</html>
