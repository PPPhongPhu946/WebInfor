<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="utf-8">
		<title>Thiết kế form đăng nhập</title>
		<link rel="stylesheet" href="../css/style2.css">
	</head>
	<body>
		<div class = "container">
			<form id = "frmLogin">
				<h3 id = "title">Đăng nhập hệ thống</h3>
				<div class = "form-group">
					<label for="txtUsername">Tên Đăng Nhập</label>
					<input class = "form-control" type="text" id="txtUsername" name="txtUsername">
				</div>
				<div class = "form-group">
					<label for="txtPassword">Mật khẩu</label>
					<input class = "form-control" type="password" id="txtPassword" name="txtPassword">
				</div>
		    	<input class = "button" type="submit" value ="Đăng nhập">
				<input class = "button" type="reset" value ="Nhập lại">
			</form>
		</div>
	</body>	
</html>
