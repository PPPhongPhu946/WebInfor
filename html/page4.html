<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="utf-8">
		<title>Hóa đơn thanh toán</title>
		<link rel="stylesheet" href="../css/style4.css">
	</head>
	<body>
		<div class="container">
			<h2>Hóa đơn thanh toán</h2>
			<table>
				<tr>
					<th>STT</th>
					<th>Tên sản phẩm</th>
					<th>Số lượng</th>
					<th>Đơn giá</th>
					<th>Thành tiền</th>
				</tr>
				<tr>
					<td>1</td>
					<td>A</td>
					<td class="sl">3</td>
					<td class="dg">1000</td>
					<td class="tt"></td>
				</tr>
				<tr>
					<td>2</td>
					<td>B</td>
					<td class="sl">4</td>
					<td class="dg">2000</td>
					<td class="tt"></td>
				</tr>
				<tr>
					<td>3</td>
					<td>C</td>
					<td class="sl">5</td>
					<td class="dg">4000</td>
					<td class="tt"></td>
				</tr>
				<tr>
					<td>4</td>
					<td>D</td>
					<td class="sl">2</td>
					<td class="dg">5000</td>
					<td class="tt"></td>
				</tr>
			</table>
		</div>
		<script>
			const soLuongList = document.getElementsByClassName("sl");
			const donGiaList = document.getElementsByClassName("dg");
			const thanhTienList = document.getElementsByClassName("tt");
 			let tong = 0;
			for(let i=0; i<donGia.length; i++){
			thanhTien[i].innerHTML = soLuongList[i].innerHTML * donGiaList[i].innerHTML;
			tong = tong + parseInt(thanhTien[i].innerHTML);
		}
		document.getElementById("tong").innerHTML = tong;
		</script>
	</body>
</html>
